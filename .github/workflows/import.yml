name: Atualizar resultados
on:
  schedule:
    - cron: "*/30 * * * *"   # a cada 30 min (UTC)
  workflow_dispatch: {}        # botão pra rodar na mão
jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar o import
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://bolao-da-copa-tau.vercel.app/api/import